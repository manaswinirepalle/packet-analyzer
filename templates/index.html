<!DOCTYPE html>
<html>
<head>
    <title>Network Packet Analyzer</title>
</head>

<body>

<h1>Network Packet Analyzer</h1>

<form action="/start" method="POST">
    <label>Number of packets:</label>
    <input type="number" name="num_packets" value="5">
    <button type="submit">Start Packet Analysis</button>
</form>

<h2>Captured Packets</h2>

<ul>
{% for packet in packets %}
    <li>{{ packet }}</li>
{% endfor %}
</ul>

</body>
</html>
