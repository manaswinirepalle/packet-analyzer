<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Packet Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-network-wired"></i> Network Packet Analyzer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#capture">Capture</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#stats">Statistics</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card bg-secondary text-light mb-4">
                    <div class="card-body">
                        <h5 class="card-title"><i class="fas fa-play"></i> Controls</h5>
                        <button id="startBtn" class="btn btn-success w-100 mb-2" data-bs-toggle="tooltip" title="Start packet capture"><i class="fas fa-play"></i> Start Capture</button>
                        <button id="stopBtn" class="btn btn-danger w-100" data-bs-toggle="tooltip" title="Stop packet capture"><i class="fas fa-stop"></i> Stop Capture</button>
                    </div>
                </div>
                <div class="card bg-secondary text-light">
                    <div class="card-body">
                        <h5 class="card-title"><i class="fas fa-filter"></i> Filters</h5>
                        <input type="text" id="searchInput" class="form-control mb-2" placeholder="Search packets...">
                        <select id="protocolFilter" class="form-select">
                            <option value="">All Protocols</option>
                            <option value="TCP">TCP</option>
                            <option value="UDP">UDP</option>
                            <option value="ICMP">ICMP</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-md-9">
                <div id="dashboard" class="mb-4">
                    <h2><i class="fas fa-tachometer-alt"></i> Dashboard</h2>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="card bg-primary text-white">
                                <div class="card-body">
                                    <h5 class="card-title">Total Packets</h5>
                                    <h3 id="totalPackets">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card bg-warning text-dark">
                                <div class="card-body">
                                    <h5 class="card-title">TCP Packets</h5>
                                    <h3 id="tcpPackets">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card bg-info text-white">
                                <div class="card-body">
                                    <h5 class="card-title">UDP Packets</h5>
                                    <h3 id="udpPackets">0</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="capture" class="mb-4">
                    <h2><i class="fas fa-list"></i> Live Packet Capture</h2>
                    <div class="table-responsive">
                        <table class="table table-dark table-striped">
                            <thead>
                                <tr>
                                    <th>Timestamp</th>
                                    <th>Source IP</th>
                                    <th>Destination IP</th>
                                    <th>Protocol</th>
                                    <th>Size</th>
                                </tr>
                            </thead>
                            <tbody id="packetTable">
                            </tbody>
                        </table>
                    </div>
                </div>
                <div id="stats">
                    <h2><i class="fas fa-chart-pie"></i> Statistics</h2>
                    <canvas id="protocolChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
